<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Page</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f5f5f5;
}

.container{
    text-align:center;
}

.logo{
    width:180px;
    height:auto;
    margin-bottom:20px;
}

.search-box{
    width:500px;
    max-width:90%;
    padding:15px;
    border:1px solid #ccc;
    border-radius:30px;
    font-size:18px;
}

button{
    margin-top:20px;
    padding:10px 30px;
    font-size:18px;
    border:none;
    border-radius:20px;
    background:#d32f2f;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#b71c1c;
}
</style>
</head>
<body>

<div class="container">

    <!-- College Logo -->
    <img src="logo.png" alt="Adhiparasakthi Engineering College Logo" class="logo">

    <!-- Search Form -->
    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        <input
            type="text"
            name="search"
            class="search-box"
            placeholder="Search..."
            required>
        <br>
        <button type="submit">Search</button>
    </form>

</div>

</body>
</html>
